<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
       <div class="weather_conatiner">
         <div class="tempretur"><span>--</span>&deg;C</div>
    <div class="location_time">
        <p>City</p>
        <span>Time - Day Date</span>
    </div>
    <div class="condition">
        <p>Condition</p>
    </div>
      </div>
    <nav>
             <form>
                 <input type="text" class="search_area"  placeholder="Search for Location">
                 <div class="button"><button type="submit">Search for Temprature</button></div>
             </form>
       </nav>
     </div>
    <div class="reset">
        <button id="resetbtn">
            Reset
        </button>
    </div>
   
    <script src="app.js"></script>
</body> 
</html>
